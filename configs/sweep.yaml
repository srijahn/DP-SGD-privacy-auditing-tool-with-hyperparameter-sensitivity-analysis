dataset:
  data_dir: data
  max_train_per_class: 300
  max_test_per_class: 150

base:
  seed: 42
  num_trials: 50
  poisoning_k: 16
  alpha: 0.05
  delta: 1e-5

  batch_size: 128
  epochs: 4
  learning_rate: 0.15
  weight_decay: 0.0

  trigger_size: 6
  target_label: 1
  poison_method: square
  svd_scale: 1.0

sweep:
  model_name: ["logreg", "mlp"]
  poison_method: ["square", "svd_lowvar"]
  noise_multiplier: [0.4, 0.8, 1.2]
  max_grad_norm: [0.5, 1.0]
  svd_scale: [0.5, 1.0, 2.0]
